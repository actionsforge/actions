name: Chart Releaser

on:
  workflow_call:
    inputs:
      charts_dir:
        type: string
        required: false
        default: "."
    secrets:
      cr_token:
        required: true

jobs:
  release:
    name: Chart Releaser
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"


      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Add repositories
        run: |
          set -euo pipefail
          REPOS_FILE=$(mktemp)
          
          # Extract repository URLs from Chart.yaml files
          find charts -name "Chart.yaml" -type f | while IFS= read -r chart_file; do
            if grep -q "dependencies:" "$chart_file"; then
              grep -A 50 "dependencies:" "$chart_file" | grep "repository:" | \
                sed -E 's/.*repository:[[:space:]]]*["'\'']?([^"'\'']+)["'\'']?[[:space:]]*$/\1/' | \
                grep -E '^https?://' >> "${REPOS_FILE}" || true
            fi
          done
          
          # Add unique repositories
          if [ -s "${REPOS_FILE}" ]; then
            sort -u "${REPOS_FILE}" | while IFS= read -r repo_url; do
              repo_name=$(echo "$repo_url" | sed 's|https\?://||' | sed 's|/.*||' | sed 's|[^a-zA-Z0-9]|-|g' | tr '[:upper:]' '[:lower:]')
              if ! helm repo list 2>/dev/null | grep -q "^${repo_name}[[:space:]]"; then
                echo "Adding Helm repository: ${repo_name} -> ${repo_url}"
                helm repo add "${repo_name}" "${repo_url}" || true
              fi
            done
          fi
          
          rm -f "${REPOS_FILE}"

      - name: Update Helm repositories
        run: helm repo update

      - name: Build chart dependencies
        run: |
          set -euo pipefail
          for dir in $(ls -d charts/*/); do
            if [ -f "${dir}/Chart.lock" ]; then
              echo "Chart.lock found, using helm dependency build for ${dir}"
              helm dependency build "$dir" || true
            else
              echo "Chart.lock not found, using helm dependency update for ${dir}"
              helm dependency update "$dir" || true
            fi
          done

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: ${{ inputs.charts_dir }}
        env:
          CR_TOKEN: "${{ secrets.cr_token }}"
