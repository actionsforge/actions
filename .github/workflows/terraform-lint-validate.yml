name: terraform-lint-validate

on:
  workflow_call:
    inputs:
      path:
        description: 'Path to the Terraform configuration directory'
        required: false
        type: string
        default: '.'

jobs:
  fmt-check:
    runs-on: ubuntu-latest
    name: Check Terraform Formatting
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Check Terraform Formatting
        uses: dflook/terraform-fmt-check@59168426e242f665bf7b70644d706224e665056a #v2.2.3
        with:
          path: ${{ inputs.path }}

  validate:
    runs-on: ubuntu-latest
    name: Validate Terraform Configuration
    needs: fmt-check
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Validate Terraform Configuration
        uses: dflook/terraform-validate@4cef5d8a4b92bcd88486e41e22a42942a382c9d6 #v2.2.3
        with:
          path: ${{ inputs.path }}
