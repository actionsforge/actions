name: Node CI Workflow

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        required: false
        default: '20'
        description: The Node.js version to use for the CI workflow.
      typecheck:
        type: boolean
        required: false
        default: false
        description: Run npm run typecheck before tests.
      coverage:
        type: boolean
        required: false
        default: false
        description: Pass --coverage flag to npm test.
      audit:
        type: boolean
        required: false
        default: false
        description: Run npm audit --audit-level=high after build.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        if: ${{ inputs.typecheck }}
        run: npm run typecheck

      - name: Run tests
        run: npm test${{ inputs.coverage && ' -- --coverage' || '' }}

      - name: Build project
        run: npm run build

      - name: Security audit
        if: ${{ inputs.audit }}
        run: npm audit --audit-level=high
