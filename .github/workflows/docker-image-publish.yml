name: docker-image-publish

on:
  workflow_call:
    inputs:
      registry-type:
        description: Container registry target (ghcr or ecr)
        type: string
        required: false
        default: "ghcr"
      image-name:
        description: Image name without registry (defaults to github.repository)
        type: string
        required: false
        default: ""
      dockerfile:
        description: Path to the Dockerfile
        type: string
        required: false
        default: "Dockerfile"
      context:
        description: Docker build context
        type: string
        required: false
        default: "."
      platforms:
        description: Target platforms for the build
        type: string
        required: false
        default: "linux/amd64"
      aws-region:
        description: AWS region for ECR (registry-type=ecr only)
        type: string
        required: false
        default: "ap-southeast-2"
      ecr-repository:
        description: ECR repository name (registry-type=ecr only)
        type: string
        required: false
        default: ""
      scan-enabled:
        description: Run Trivy before push
        type: boolean
        required: false
        default: true
      trivy-severity:
        description: Comma-separated severities that fail the scan
        type: string
        required: false
        default: "CRITICAL"
      trivy-ignore-unfixed:
        description: Ignore unfixed vulnerabilities in Trivy
        type: boolean
        required: false
        default: false
    secrets:
      aws-role-arn:
        description: IAM role ARN for OIDC ECR push (registry-type=ecr only)
        required: false

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ inputs.image-name != '' && inputs.image-name || github.repository }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Validate publish inputs
        run: |
          if [[ "${{ inputs.registry-type }}" != "ghcr" && "${{ inputs.registry-type }}" != "ecr" ]]; then
            echo "registry-type must be one of: ghcr, ecr"
            exit 1
          fi

          if [[ "${{ inputs.registry-type }}" == "ecr" && -z "${{ inputs.ecr-repository }}" ]]; then
            echo "ecr-repository is required when registry-type=ecr"
            exit 1
          fi

          if [[ "${{ inputs.registry-type }}" == "ecr" && -z "${{ secrets.aws-role-arn }}" ]]; then
            echo "secrets.aws-role-arn is required when registry-type=ecr"
            exit 1
          fi

          if [[ "${{ inputs.scan-enabled }}" == "true" && "${{ inputs.platforms }}" == *","* ]]; then
            echo "Trivy image scan requires a single loaded platform image."
            echo "Set platforms to a single target (for example linux/amd64), or disable scan-enabled."
            exit 1
          fi

      - name: Configure AWS credentials
        if: inputs.registry-type == 'ecr'
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b #v6.2.1
        with:
          role-to-assume: ${{ secrets.aws-role-arn }}
          aws-region: ${{ inputs.aws-region }}

      - name: Log in to Amazon ECR
        if: inputs.registry-type == 'ecr'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 #v2.1.6

      - name: Lowercase image name (GHCR)
        if: inputs.registry-type == 'ghcr'
        run: |
          echo "IMAGE_LOWER=ghcr.io/$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        if: inputs.registry-type == 'ghcr'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 #v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c #v4.2.0

      - name: Resolve registry image
        id: image
        run: |
          if [[ "${{ inputs.registry-type }}" == "ecr" ]]; then
            echo "ref=${{ steps.ecr-login.outputs.registry }}/${{ inputs.ecr-repository }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${IMAGE_LOWER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 #v6.2.0
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=sha,format=long
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a #v7.3.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: false
          load: true
          tags: image:publish
          platforms: ${{ inputs.platforms }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        if: inputs.scan-enabled
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 #v0.36.0
        with:
          image-ref: image:publish
          format: table
          severity: ${{ inputs.trivy-severity }}
          exit-code: "1"
          ignore-unfixed: ${{ inputs.trivy-ignore-unfixed }}

      - name: Push image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a #v7.3.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ inputs.platforms }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
